services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: riseup
      POSTGRES_PASSWORD: riseup
      POSTGRES_DB: riseup
    ports:
      - "5432:5432"
    volumes:
      - riseup_pg_data:/var/lib/postgresql/data

volumes:
  riseup_pg_data:
