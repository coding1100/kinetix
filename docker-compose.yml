services:
  postgres:
    image: postgres:16.14-alpine
    restart: unless-stopped
    shm_size: 128mb
    env_file:
      - docker-compose.env
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - riseup_pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-riseup} -d $${POSTGRES_DB:-riseup}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  riseup_pg_data:
