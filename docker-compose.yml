services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - docker-compose.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-riseup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-riseup}
      POSTGRES_DB: ${POSTGRES_DB:-riseup}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - riseup_pg_data:/var/lib/postgresql/data

volumes:
  riseup_pg_data:
