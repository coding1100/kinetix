# Staging stack — Docker only (no systemd, no host ports).
# Public URL: http://HOST/staging via production nginx (kinetix-nginx-1).
#
# Deploy:
#   docker network create kinetix_edge 2>/dev/null || true
#   docker compose -f docker-compose.staging.yml up -d --build

name: kinetix-staging

networks:
  internal:
    driver: bridge
  edge:
    external: true
    name: kinetix_edge

services:
  postgres:
    image: postgres:16-alpine
    container_name: kinetix-staging-postgres
    restart: unless-stopped
    networks:
      - internal
    env_file:
      - docker-compose.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-riseup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-riseup}
      POSTGRES_DB: ${POSTGRES_DB:-riseup_staging}
    volumes:
      - riseup_pg_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-riseup} -d ${POSTGRES_DB:-riseup_staging}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build: ./backend-py
    image: kinetix-staging-api
    container_name: kinetix-staging-api
    restart: unless-stopped
    networks:
      - internal
      - edge
    env_file:
      - ./backend-py/.env
      - docker-compose.env
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-riseup}:${POSTGRES_PASSWORD:-riseup}@postgres:5432/${POSTGRES_DB:-riseup_staging}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-riseup}:${POSTGRES_PASSWORD:-riseup}@postgres:5432/${POSTGRES_DB:-riseup_staging}
      API_PUBLIC_URL: ${STAGING_PUBLIC_URL:-http://3.140.5.67/staging}
      FRONTEND_URL: ${STAGING_FRONTEND_ORIGIN:-http://3.140.5.67}
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BASE_PATH: /staging
        NEXT_PUBLIC_API_URL: /staging/api/v1
        NEXT_PUBLIC_APP_URL: ${STAGING_PUBLIC_URL:-http://3.140.5.67/staging}
        NEXT_PUBLIC_SOCKET_URL: ${STAGING_PUBLIC_URL:-http://3.140.5.67/staging}
    image: kinetix-staging-web
    container_name: kinetix-staging-web
    restart: unless-stopped
    networks:
      - edge
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_BASE_PATH: /staging
      NEXT_PUBLIC_API_URL: /staging/api/v1
      NEXT_PUBLIC_APP_URL: ${STAGING_PUBLIC_URL:-http://3.140.5.67/staging}
      NEXT_PUBLIC_SOCKET_URL: ${STAGING_PUBLIC_URL:-http://3.140.5.67/staging}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  riseup_pg_data_staging:
