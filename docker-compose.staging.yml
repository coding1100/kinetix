# Staging stack — Docker only (no systemd, no host ports).
# Public URL: http://HOST/staging via production nginx (kinetix-nginx-1).
#
# Deploy:
#   ./deploy/reset-staging-docker.sh
#   docker compose -f docker-compose.staging.yml up -d --build

name: kinetix-staging

networks:
  internal:
    driver: bridge
  edge:
    external: true
    name: kinetix_edge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - internal
    env_file:
      - docker-compose.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-riseup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-riseup}
      POSTGRES_DB: ${POSTGRES_DB:-riseup}
    volumes:
      - riseup_pg_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-riseup} -d ${POSTGRES_DB:-riseup}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    build: ./backend-py
    image: kinetix-staging-api
    restart: unless-stopped
    networks:
      internal:
      edge:
        aliases:
          - kinetix-staging-api
    env_file:
      - docker-compose.env
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-riseup}:${POSTGRES_PASSWORD:-riseup}@postgres:5432/${POSTGRES_DB:-riseup}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-riseup}:${POSTGRES_PASSWORD:-riseup}@postgres:5432/${POSTGRES_DB:-riseup}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-staging-jwt-access-secret-min-32-chars-long}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-staging-jwt-refresh-secret-min-32-chars-long}
      API_PUBLIC_URL: ${STAGING_PUBLIC_URL:-http://3.140.5.67/staging}
      FRONTEND_URL: ${STAGING_FRONTEND_ORIGIN:-http://3.140.5.67}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BASE_PATH: /staging
        NEXT_PUBLIC_API_URL: /staging/api/v1
        NEXT_PUBLIC_APP_URL: ${STAGING_PUBLIC_URL:-http://3.140.5.67/staging}
        NEXT_PUBLIC_SOCKET_URL: ${STAGING_PUBLIC_URL:-http://3.140.5.67/staging}
    image: kinetix-staging-web
    restart: unless-stopped
    networks:
      edge:
        aliases:
          - kinetix-staging-web
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_BASE_PATH: /staging
      NEXT_PUBLIC_API_URL: /staging/api/v1
      NEXT_PUBLIC_APP_URL: ${STAGING_PUBLIC_URL:-http://3.140.5.67/staging}
      NEXT_PUBLIC_SOCKET_URL: ${STAGING_PUBLIC_URL:-http://3.140.5.67/staging}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_started

volumes:
  riseup_pg_data_staging:
