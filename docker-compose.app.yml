# Production app stack — use with:
#   cp docker-compose.env.example docker-compose.env   # set secrets on server only
#   docker compose -f docker-compose.yml -f docker-compose.app.yml up -d

services:
  postgres:
    env_file:
      - docker-compose.env
    ports:
      - "127.0.0.1:5432:5432"

  api:
    build: ./backend-py
    image: kinetix-api
    restart: unless-stopped
    env_file:
      - ./backend-py/.env
      - docker-compose.env
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-riseup}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-riseup}
      API_PUBLIC_URL: ${PUBLIC_APP_URL:-http://3.140.5.67}
      FRONTEND_URL: ${PUBLIC_APP_URL:-http://3.140.5.67}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build: ./frontend
    image: kinetix-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    networks:
      - default
      - edge

networks:
  edge:
    name: kinetix_edge
    driver: bridge
