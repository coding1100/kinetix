# Full stack: API + Web + Nginx (use with docker-compose.yml for Postgres).
#
#   docker compose -f docker-compose.yml -f docker-compose.app.yml up -d --build
#
# Set PUBLIC_APP_URL in docker-compose.env (e.g. http://3.140.5.67).

services:
  api:
    build: ./backend-py
    restart: unless-stopped
    env_file:
      - ./backend-py/.env
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-riseup}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-riseup}
      API_PUBLIC_URL: ${PUBLIC_APP_URL:-http://localhost}
      FRONTEND_URL: ${PUBLIC_APP_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost}
        NEXT_PUBLIC_SOCKET_URL: ${PUBLIC_APP_URL:-http://localhost}
    restart: unless-stopped
    environment:
      API_PROXY_TARGET: http://api:4000
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
