# Full stack: API + Web + Nginx (use with docker-compose.yml for Postgres).
#
#   docker compose --env-file docker-compose.env \
#     -f docker-compose.yml -f docker-compose.app.yml up -d --build
#
# docker-compose.env must set PUBLIC_APP_URL and DATABASE_URL (@postgres host).

services:
  api:
    build: ./backend-py
    restart: unless-stopped
    env_file:
      - ./backend-py/.env
      - ./docker-compose.env
    environment:
      NODE_ENV: production
      PORT: "4000"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost}
        NEXT_PUBLIC_SOCKET_URL: ${PUBLIC_APP_URL:-http://localhost}
    restart: unless-stopped
    environment:
      API_PROXY_TARGET: http://api:4000
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
