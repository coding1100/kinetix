name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          APP_ROOT: ${{ secrets.EC2_APP_PATH }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: APP_ROOT
          command_timeout: 40m
          script: |
            set -euo pipefail
            export APP_ROOT="${APP_ROOT:-/opt/clickup/kinetix}"
            export DEPLOY_MODE=docker
            cd "$APP_ROOT"
            # Reset before deploy.sh so local edits on the server cannot block CI
            git fetch origin main
            git reset --hard origin/main
            chmod +x deploy/deploy.sh deploy/setup-services.sh deploy/fix-frontend-prod.sh 2>/dev/null || true
            ./deploy/deploy.sh

      - name: Summary
        if: success()
        run: echo "Deployed to production EC2"
